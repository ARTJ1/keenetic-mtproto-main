name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.7). Do not leave an old default like v1.0.3."
        required: true
        type: string
        default: "v1.0.7"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            suffix: linux-mipsle_softfloat
          - goos: linux
            goarch: mips
            gomips: softfloat
            suffix: linux-mips_softfloat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X github.com/keenetic-mtproto/keenetic-mtproto/internal/web.Version=${VERSION}" -o keenetic-mtproto ./cmd/keenetic-mtproto
          tar -czf "keenetic-mtproto-${{ matrix.suffix }}.tar.gz" keenetic-mtproto

      - uses: actions/upload-artifact@v4
        with:
          name: keenetic-mtproto-${{ matrix.suffix }}
          path: keenetic-mtproto-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          case "$TAG" in
            ""|main|master)
              echo "Need a version tag like v1.0.3 (got: '$TAG')"
              exit 1
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: keenetic-mtproto-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -eu
          echo "Tag=$TAG"
          echo "Artifacts:"
          find artifacts -type f -name '*.tar.gz' -print

          COUNT=$(find artifacts -type f -name '*.tar.gz' | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "No tar.gz files found"
            find artifacts -type f -print || true
            exit 1
          fi

          # Put files in a flat dir for simple globbing
          mkdir -p dist
          find artifacts -type f -name '*.tar.gz' -exec cp -f {} dist/ \;
          ls -la dist

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Updating existing release $TAG"
            gh release upload "$TAG" dist/*.tar.gz --clobber --repo "$GITHUB_REPOSITORY"
          else
            echo "Creating release $TAG on $GITHUB_SHA"
            gh release create "$TAG" dist/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
