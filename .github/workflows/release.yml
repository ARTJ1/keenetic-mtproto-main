name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g. v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            suffix: linux-mipsle_softfloat
          - goos: linux
            goarch: mips
            gomips: softfloat
            suffix: linux-mips_softfloat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X github.com/keenetic-mtproto/keenetic-mtproto/internal/web.Version=${VERSION}" -o keenetic-mtproto ./cmd/keenetic-mtproto
          tar -czf keenetic-mtproto-${{ matrix.suffix }}.tar.gz keenetic-mtproto

      - uses: actions/upload-artifact@v4
        with:
          name: keenetic-mtproto-${{ matrix.suffix }}
          path: keenetic-mtproto-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "main" ] || [ "$TAG" = "master" ]; then
            echo "Refusing to release without a version tag (got: '$TAG')"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: keenetic-mtproto-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -eux
          # Tag must already exist on the remote (create it via git push --tags)
          if ! gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Remote tag '${TAG}' not found. Create it first:"
            echo "  git tag ${TAG} && git push origin ${TAG}"
            exit 1
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.tar.gz --clobber --repo "${{ github.repository }}"
          else
            gh release create "$TAG" artifacts/*.tar.gz \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
